<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VUS Hub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f172a; color: #f1f5f9; font-family: Arial, sans-serif; padding: 16px; }
  .hub-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 22px; font-weight: 500; border-bottom: 1px solid #1f2937; color: #f1f5f9; }
  .hub-tabs { display: flex; gap: 8px; padding: 12px 0; border-bottom: 1px solid #1f2937; flex-wrap: wrap; }
  .hub-tab { padding: 6px 14px; border-radius: 8px; cursor: pointer; background: #1e293b; border: 1px solid #334155; font-size: 14px; color: #94a3b8; transition: background 0.15s; }
  .hub-tab:hover { background: #334155; color: #f1f5f9; }
  .hub-tab.active { background: #22c55e; color: #000; border-color: #22c55e; font-weight: 500; }

  .hub-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 16px 0;
  }
  @media (max-width: 500px) {
    .hub-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .hub-card { background: #1e293b; border-radius: 12px; border: 1px solid #334155; padding: 16px 14px; cursor: pointer; text-align: center; transition: border-color 0.15s, background 0.15s; }
  .hub-card:hover { border-color: #475569; background: #334155; }
  .hub-card-title { font-size: 15px; font-weight: 500; margin-bottom: 5px; color: #f1f5f9; }
  .hub-card-sub { font-size: 12px; color: #94a3b8; }
  .hub-status { font-size: 13px; color: #94a3b8; padding: 12px 0; text-align: center; min-height: 20px; }
  .hub-status.err { color: #ef4444; }
  .hub-empty { font-size: 14px; color: #475569; padding: 32px 0; text-align: center; }

  .hub-footer {
    margin-top: 8px;
    border-top: 1px solid #1f2937;
    padding: 12px 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .hub-footer-left { font-size: 13px; color: #475569; }
  .hub-footer-link {
    font-size: 13px;
    color: #22c55e;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.15s;
  }
  .hub-footer-link:hover { color: #4ade80; }
  .hub-footer-link svg { width: 14px; height: 14px; }
</style>
</head>
<body>

<div class="hub-header">
  <div>VUS Hub</div>
  <div id="clock"></div>
</div>

<div class="hub-tabs" id="tabs"></div>
<div class="hub-status" id="status"></div>
<div class="hub-grid" id="grid"></div>

<div class="hub-footer">
  <span class="hub-footer-left">VUS Hub</span>
  <a class="hub-footer-link" href="https://docs.google.com/forms/d/e/1FAIpQLSfO_dcIdueYBKYRj11jthkGrWO22ZLg3kQGr8dXYvrXne_wUA/viewform" target="_blank">
    Rate / Suggest
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
      <polyline points="15 3 21 3 21 9"/>
      <line x1="10" y1="14" x2="21" y2="3"/>
    </svg>
  </a>
</div>

<script>
const apps = {
  home: [
    { name: "VUSL", url: "https://raw.githubusercontent.com/Cra-Z-Gaming/VUS/main/VUSL", desc: "Main game hub" },
    { name: "YouTube", url: "https://raw.githubusercontent.com/Cra-Z-Gaming/VUS/refs/heads/main/YouTube%20Premium%20V11%20K1", desc: "YouTube Version 11 K1" },
    { name: "VUS AI Chat", url: "https://raw.githubusercontent.com/Cra-Z-Gaming/VUS/refs/heads/main/Core-VUS-AI", desc: "groq AI - VUS, Blocked In Wboro" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" }
  ],
  tools: [
    { name: "about:blank opener", url: "https://raw.githubusercontent.com/Cra-Z-Gaming/VUS/refs/heads/main/about%3Ablank%20opener", desc: "Opens files as about:blank" },
    { name: "Timer", url: "https://raw.githubusercontent.com/Cra-Z-Gaming/VUS/refs/heads/main/Timer", desc: "Stopwatch + countdown timer" },
    { name: "Code Editor", url: "https://raw.githubusercontent.com/Cra-Z-Gaming/VUS/refs/heads/main/HTML%20Editor", desc: "Live code editor" },
    { name: "Local Music Player", url: "https://raw.githubusercontent.com/Cra-Z-Gaming/VUS/refs/heads/main/vus-music-player.html", desc: "You need your own music files to start listening." },
    { name: "File + Folder Viewer", url: "https://raw.githubusercontent.com/Cra-Z-Gaming/VUS/refs/heads/main/File%20Viewer", desc: "Browse your files and folders" },
    { name: "AI Code Editor", url: "https://raw.githubusercontent.com/Cra-Z-Gaming/VUS/refs/heads/main/AI-HTML-Studio", desc: "Code editor with AI — replace, add, and delete specific lines" },
    { name: "Groq API Keys", url: "https://raw.githubusercontent.com/Cra-Z-Gaming/VUS/refs/heads/main/GroqKeys-NeatUI", desc: "Free Groq API keys for anyone" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" }
  ],
  links: [
    { name: "Scratch", url: "https://scratch.mit.edu/", desc: "Games, music, and animations" },
    { name: "Keep VUS AI Alive", url: "https://raw.githubusercontent.com/Cra-Z-Gaming/VUS/refs/heads/main/Keep%20VUS%20AI%20Alive", desc: "Create and send your key to keep VUS AI alive for everyone" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" },
    { name: "", url: "", desc: "" }
  ]
};

let current = "home";

function setStatus(msg, isErr) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = "hub-status" + (isErr ? " err" : "");
}

function openApp(app) {
  if (!app.url) return;

  if (!app.url.includes("raw.githubusercontent.com")) {
    window.open(app.url, "_blank");
    return;
  }

  setStatus("Loading " + app.name + "...");

  fetch(app.url)
    .then(r => {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.text();
    })
    .then(text => {
      const win = window.open("about:blank", "_blank");
      if (!win) {
        setStatus("Popup blocked — allow popups for this site.", true);
        return;
      }
      win.document.open();
      win.document.write(text);
      win.document.close();
      setStatus("");
    })
    .catch(() => {
      setStatus("Failed to load " + app.name + ".", true);
    });
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  setStatus("");

  const filled = apps[current].filter(app => app.url && app.url.trim() !== "");
  if (filled.length === 0) {
    const empty = document.createElement("div");
    empty.className = "hub-empty";
    empty.textContent = "Nothing here yet.";
    grid.appendChild(empty);
    return;
  }

  filled.forEach(app => {
    const card = document.createElement("div");
    card.className = "hub-card";

    const title = document.createElement("div");
    title.className = "hub-card-title";
    title.textContent = app.name;

    const sub = document.createElement("div");
    sub.className = "hub-card-sub";
    sub.textContent = app.desc;

    card.appendChild(title);
    card.appendChild(sub);
    card.onclick = () => openApp(app);
    grid.appendChild(card);
  });
}

const tabLabels = { home: "Home", tools: "Tools", links: "Links" };
const tabsEl = document.getElementById("tabs");
Object.keys(apps).forEach(key => {
  const tab = document.createElement("div");
  tab.className = "hub-tab" + (key === current ? " active" : "");
  tab.textContent = tabLabels[key];
  tab.onclick = () => {
    current = key;
    document.querySelectorAll(".hub-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    render();
  };
  tabsEl.appendChild(tab);
});

function updateClock() {
  const el = document.getElementById("clock");
  if (!el) return;
  const now = new Date();
  el.textContent = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}
setInterval(updateClock, 1000);
updateClock();
render();
</script>
</body>
</html>
