<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>VUS</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 20px;
    }

    h1 {
      margin-bottom: 5px;
    }

    #meta {
      margin-bottom: 20px;
      font-size: 12px;
      opacity: 0.7;
    }

    #buttons {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2a2a2a;
      color: white;
      font-size: 14px;
    }

    button:hover {
      background: #444;
    }
  </style>
</head>

<body>

  <h1>VUS</h1>

  <div id="meta">
    <div>Version: v1.0.0</div>
    <div id="lastUpdated"></div>
  </div>

  <div id="buttons"></div>

  <script>
    // show last load time
    document.getElementById("lastUpdated").innerText =
      "Last loaded: " + new Date().toLocaleString();

    // load links
    fetch("Links.txt")
      .then(r => r.text())
      .then(text => {
        const container = document.getElementById("buttons");

        const lines = text
          .split("\n")
          .map(l => l.trim())
          .filter(Boolean);

        lines.forEach(line => {
          const parts = line.split("|");

          if (parts.length < 2) return;

          const name = parts[0];
          const url = parts[1];

          const btn = document.createElement("button");
          btn.textContent = name;

          btn.onclick = () => {
            window.location.href = url;
          };

          container.appendChild(btn);
        });
      })
      .catch(() => {
        document.getElementById("buttons").innerText =
          "Failed to load Links.txt";
      });
  </script>

</body>
</html>
