<!DOCTYPE html>
<html>
<head>
    <title>VUS Hub</title>
</head>
<body>

<h2>VUS Hub</h2>

<button onclick="openApp('https://raw.githubusercontent.com/Cra-Z-Gaming/VUS/main/VUSL')">
    VUSL
</button>

<!-- Add more apps like this:
<button onclick="openApp('RAW_URL_HERE')">Game 2</button>
-->

<script>
async function openApp(url) {
    try {
        const html = await fetch(url).then(r => r.text());

        const win = window.open("about:blank", "_blank");

        win.document.open();
        win.document.write(html);
        win.document.close();

    } catch (e) {
        console.error(e);
        alert("Failed to load app");
    }
}
</script>

</body>
</html>
