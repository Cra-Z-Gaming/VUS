<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VUS Hub</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        header {
            padding: 16px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            background: #111827;
            border-bottom: 1px solid #1f2937;
        }

        #tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background: #0b1220;
            border-bottom: 1px solid #1f2937;
        }

        .tab {
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            background: #1e293b;
            border: 1px solid #334155;
            transition: 0.2s;
            font-size: 14px;
        }

        .tab:hover {
            background: #334155;
        }

        .tab.active {
            background: #22c55e;
            color: black;
            font-weight: bold;
        }

        #container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            border: 1px solid #334155;
        }

        .card:hover {
            transform: translateY(-3px);
            background: #334155;
        }

        .title {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .sub {
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<header>VUS Hub</header>

<div id="tabs">
    <div class="tab active" id="tab-home">Home</div>
    <div class="tab" id="tab-tools">Tools</div>
</div>

<div id="container"></div>

<script>
const hubs = [
    {
        name: "VUSL",
        url: "https://raw.githubusercontent.com/Cra-Z-Gaming/VUS/main/VUSL",
        desc: "Main game hub"
    },
    {
        name: "YouTube",
        url: "https://raw.githubusercontent.com/Cra-Z-Gaming/VUS/refs/heads/main/YouTube%20Premium%20V11%20K1",
        desc: "YouTube Version 11 K1"
    },
    {
        name: "Empty Slot",
        url: "",
        desc: ""
    },
    {
        name: "App 4",
        url: "",
        desc: "Empty slot"
    },
    {
        name: "App 5",
        url: "",
        desc: "Empty slot"
    }
];

const tools = [
    {
        name: "Base64 Tool",
        url: "",
        desc: "Encode / Decode text"
    },
    {
        name: "HTML Viewer",
        url: "",
        desc: "Render raw HTML"
    },
    {
        name: "URL Opener",
        url: "",
        desc: "Open links in about:blank"
    },
    {
        name: "Notes",
        url: "",
        desc: "Simple local notes"
    },
    {
        name: "JSON Formatter",
        url: "",
        desc: "Format JSON data"
    }
];

let currentTab = "home";

function openApp(url) {
    fetch(url)
        .then(r => r.text())
        .then(html => {
            const win = window.open("about:blank", "_blank");
            win.document.open();
            win.document.write(html);
            win.document.close();
        });
}

function render() {
    const container = document.getElementById("container");
    container.innerHTML = "";

    const list = currentTab === "home" ? hubs : tools;

    list.forEach(app => {
        if (!app.url) return;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="title">${app.name}</div>
            <div class="sub">${app.desc}</div>
        `;

        card.onclick = () => openApp(app.url);

        container.appendChild(card);
    });
}

/* Tabs */
document.getElementById("tab-home").onclick = () => {
    currentTab = "home";

    document.getElementById("tab-home").classList.add("active");
    document.getElementById("tab-tools").classList.remove("active");

    render();
};

document.getElementById("tab-tools").onclick = () => {
    currentTab = "tools";

    document.getElementById("tab-tools").classList.add("active");
    document.getElementById("tab-home").classList.remove("active");

    render();
};

render();
</script>

</body>
</html>
